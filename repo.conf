# ============================================
# Jackbot OS 软件仓库主配置
# Repository Main Configuration
# ============================================

[repository]
# 仓库名称
name = Jackbot OS Repository
# 仓库代号
codename = 1000
# 仓库版本
version = 1000 Ultimate Edition
# 仓库架构
architectures = x86_64
# 仓库组件
components = base gui apps
# 仓库描述
description = Jackbot OS 官方软件仓库

[server]
# 主服务器地址
primary_url = https://jackbot.github.io/jackbot-repo
# 备用服务器
backup_url = https://jackbot.gitee.io/jackbot-repo
# 连接超时（秒）
timeout = 30
# 下载重试次数
retries = 3
# 是否启用断点续传
resume = true

[security]
# 是否启用签名验证
enable_signature = true
# 公钥文件路径
public_key = /keys/jackbot-repo.pub
# 密钥服务器
keyserver = keyserver.ubuntu.com

[packages]
# 软件包目录
packages_dir = /packages
# ISO 镜像目录
iso_dir = /iso
# 压缩格式
compression = tar.gz
# 包格式
package_format = jackpkg

[sync]
# 自动同步
auto_sync = true
# 同步间隔（小时）
sync_interval = 6
# 同步时验证签名
verify_on_sync = true

[mirror]
# 是否允许镜像
allow_mirror = true
# 推荐镜像列表
mirrors = jackbot.github.io, jackbot.gitee.io
